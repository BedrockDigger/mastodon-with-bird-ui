name: Build Mastodon with Bird UI

on:
  schedule:
    # Run every 6 hours to check for new upstream releases
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if tag already exists'
        required: false
        type: boolean
        default: false
      custom_tag:
        description: 'Build a specific Mastodon tag (e.g., v4.3.0)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      should_build: ${{ steps.check-build.outputs.should_build }}
      image_name: ${{ steps.prep.outputs.image_name }}
    steps:
      - name: Prep Image Name
        id: prep
        run: |
          IMAGE_NAME="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
      - name: Get Target Tag
        id: get-tag
        run: |
          if [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            TAG="${{ github.event.inputs.custom_tag }}"
          else
            # Fetch latest release tag from mastodon/mastodon
            TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/mastodon/mastodon/releases/latest | jq -r .tag_name)
          fi
          
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Error: Could not retrieve latest Mastodon tag" >&2
            exit 1
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Target Mastodon version tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if build is needed
        id: check-build
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          
          if [ "$FORCE_BUILD" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "Force build or push event detected. Proceeding to build."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if tag exists in GHCR using docker buildx imagetools inspect
          if docker buildx imagetools inspect ${{ steps.prep.outputs.image_name }}:${TAG} >/dev/null 2>&1; then
            echo "Image tag $TAG already exists in GHCR. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Image tag $TAG does not exist in GHCR. Proceeding to build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    env:
      IMAGE_NAME: ${{ needs.check.outputs.image_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Mastodon
        uses: actions/checkout@v6
        with:
          repository: mastodon/mastodon
          ref: ${{ needs.check.outputs.tag }}
          path: mastodon

      - name: Checkout Bird UI
        uses: actions/checkout@v6
        with:
          repository: rollecode/mastodon-bird-ui
          path: mastodon-bird-ui

      - name: Install Bird UI to Mastodon
        run: |
          # Define and export a dummy chown function to prevent script failure on runner
          chown() { :; }
          export -f chown
          
          cd mastodon-bird-ui
          # Install Bird UI to Mastodon with all variations (-v) and set it as the default theme (-d)
          bash scripts/install-to-mastodon.sh --path ../mastodon -v -d

      - name: Add Bird UI locale entries to all locales
        run: |
          # Define add_locale_entry function as defined in install-to-mastodon.sh
          add_locale_entry() {
            local file="$1"
            local key="$2"
            local value="$3"
            local lang="$4"

            [ ! -f "$file" ] && return

            if ! grep -q "^    ${key}:" "$file"; then
              if grep -q "^  themes:" "$file"; then
                sed -i "/^  themes:/a\\    ${key}: ${value}" "$file"
                echo -e "  Added to $lang: $key"
              fi
            fi
          }

          # Update all other locales besides en and fi
          for file in mastodon/config/locales/*.yml; do
            filename=$(basename "$file")
            # Only process main locale files (avoid files with dots in the name before .yml)
            if [[ "$filename" == *.*.yml ]]; then
              continue
            fi
            # Skip en.yml and fi.yml since they are handled by install-to-mastodon.sh
            if [[ "$filename" == "en.yml" || "$filename" == "fi.yml" ]]; then
              continue
            fi

            # Update default locale label to Mastodon Bird UI
            sed -i "s/^    default: Mastodon.*/    default: Mastodon Bird UI/" "$file"

            # Add other theme variants using add_locale_entry
            add_locale_entry "$file" "mastodon-dark" "Mastodon" "$filename"
            add_locale_entry "$file" "mastodon-bird-ui-accessible" "Mastodon Bird UI (Accessible)" "$filename"
            add_locale_entry "$file" "mastodon-bird-ui-accessible-plus" "Mastodon Bird UI (Accessible Plus)" "$filename"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: mastodon
          file: mastodon/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Export Digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [check, build]
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: ${{ needs.check.outputs.image_name }}
    steps:
      - name: Download Digest Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          cd /tmp/digests
          
          # Combine digests into the final multi-arch manifest
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:${{ needs.check.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            $(printf "${{ env.IMAGE_NAME }}@sha256:%s " *)
